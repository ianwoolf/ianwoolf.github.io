# Hexo Configuration

# Site
title: ianwoolf's Blog
subtitle: '自留地，想到啥写啥'
description: 'ianwoolf的技术博客'
keywords: blog, tech
author: ianwoolf
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: http://ianwoolf.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :year-:month-:day-:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: geektutu

# Theme config
header_icon: /favicon.ico
widgets:
  mobile_qrcode: false
  caidan: false
menu:
  - { key: "首页", link: "/" }
  - { key: "归档", link: "/archives/" }
  - { key: "标签", link: "/tags/" }
  - { key: "关于", link: "/about/" }

# Deployment
deploy:
  type: git
  repo: git@github.com:ianwoolf/ianwoolf.github.io.git
  branch: main
